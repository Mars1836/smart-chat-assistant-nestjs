<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: Arial, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
          <!-- Header -->
          <tr>
            <td style="padding: 40px 40px 20px 40px; border-bottom: 1px solid #e0e0e0;">
              <h1 style="margin: 0; font-size: 24px; color: #333333; font-weight: 600;">
                Workspace Invitation
              </h1>
            </td>
          </tr>
          
          <!-- Body -->
          <tr>
            <td style="padding: 40px;">
              <p style="margin: 0 0 16px 0; font-size: 16px; color: #333333; line-height: 1.5;">
                Hi there,
              </p>
              
              <p style="margin: 0 0 8px 0; font-size: 16px; color: #333333; line-height: 1.5;">
                <strong>{{inviterName}}</strong> has invited you to join the workspace <strong>{{workspaceName}}</strong>.
              </p>
              
              <p style="margin: 0 0 24px 0; font-size: 14px; color: #666666; line-height: 1.5;">
                Invited by: {{inviterEmail}}
              </p>
              
              <!-- CTA Button -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding: 20px 0;">
                    <a href="{{acceptLink}}" 
                       style="display: inline-block; padding: 14px 32px; background-color: #2563eb; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 16px; font-weight: 500;">
                      Accept Invitation
                    </a>
                  </td>
                </tr>
              </table>
              
              <p style="margin: 24px 0 8px 0; font-size: 14px; color: #666666; line-height: 1.5;">
                Or copy and paste this link into your browser:
              </p>
              
              <p style="margin: 0; padding: 12px; background-color: #f5f5f5; border-radius: 4px; font-size: 13px; color: #666666; word-break: break-all; line-height: 1.4;">
                {{acceptLink}}
              </p>
            </td>
          </tr>
          
          <!-- Footer -->
          <tr>
            <td style="padding: 30px 40px; background-color: #f9f9f9; border-top: 1px solid #e0e0e0;">
              <p style="margin: 0; font-size: 12px; color: #999999; line-height: 1.5;">
                This invitation will expire in 7 days.
              </p>
              <p style="margin: 10px 0 0 0; font-size: 12px; color: #999999; line-height: 1.5;">
                Smart Chat Assistant
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
